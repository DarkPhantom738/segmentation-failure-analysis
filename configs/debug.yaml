# Fast local smoke-test configuration (small patches, few epochs)

seed: 42

data:
  root: "data/BraTS2021_Training"
  val_fraction: 0.2
  target_spacing: [1.0, 1.0, 1.0]
  percentile_clip: [1.0, 99.0]
  patch_size: [32, 32, 32]
  patches_per_volume: 2
  modalities: ["t1", "t1ce", "t2", "flair"]

model:
  in_channels: 4
  num_classes: 4
  base_features: 16
  embedding_dim: 64

training:
  epochs: 1
  batch_size: 1
  learning_rate: 0.0001
  weight_decay: 0.00001
  dice_weight: 0.5
  num_workers: 0
  val_artifact_every: 1
  checkpoint_every: 1

output:
  dir: "outputs"
  checkpoint_dir: "outputs/checkpoints"

uncertainty:
  enabled: true
  export_during_validation: false
  overlap: 0.5
