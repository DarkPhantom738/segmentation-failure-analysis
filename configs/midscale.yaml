# Mid-scale Failure Cartography run
# 300 cases, ~60 val, 50 epochs, 128^3 patches, 1mm spacing
# Expected runtime on Apple MPS: many hours (overnight-scale)

seed: 42

data:
  root: "/Users/aniketmangalampalli/Downloads/archive/BraTS2021_Training_Data"
  max_cases: 300
  val_fraction: 0.2
  target_spacing: [1.0, 1.0, 1.0]
  percentile_clip: [1.0, 99.0]
  patch_size: [128, 128, 128]
  patches_per_volume: 2
  modalities: ["t1", "t1ce", "t2", "flair"]
  # Lazy-load cases; cache preprocessed volumes to disk for later epochs
  preload: false
  cache_dir: "outputs_midscale/cache"

model:
  in_channels: 4
  num_classes: 4
  base_features: 32
  embedding_dim: 256

training:
  epochs: 50
  batch_size: 1
  learning_rate: 0.0001
  weight_decay: 0.00001
  dice_weight: 0.5
  num_workers: 0
  val_artifact_every: 50
  checkpoint_every: 10

output:
  dir: "outputs_midscale"
  checkpoint_dir: "outputs_midscale/checkpoints"

uncertainty:
  enabled: true
  export_during_validation: false
  overlap: 0.5
  max_augmentations: 8
