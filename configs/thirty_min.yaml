# Best-effort ~30 minute pipeline on Apple MPS (post bug-fix)
# Prioritizes: enough val cases for baselines + real learning
# Tradeoff: 2mm spacing + 64^3 patches (128^3/1mm cannot finish in 30 min)

seed: 42

data:
  root: "/Users/aniketmangalampalli/Downloads/archive/BraTS2021_Training_Data"
  max_cases: 120
  val_fraction: 0.25
  target_spacing: [2.0, 2.0, 2.0]
  percentile_clip: [1.0, 99.0]
  patch_size: [64, 64, 64]
  patches_per_volume: 2
  modalities: ["t1", "t1ce", "t2", "flair"]
  preload: false
  cache_dir: "outputs_30min/cache"

model:
  in_channels: 4
  num_classes: 4
  base_features: 24
  embedding_dim: 128

training:
  epochs: 12
  batch_size: 1
  learning_rate: 0.0001
  weight_decay: 0.00001
  dice_weight: 0.5
  num_workers: 0
  val_artifact_every: 12
  checkpoint_every: 12

output:
  dir: "outputs_30min"
  checkpoint_dir: "outputs_30min/checkpoints"

uncertainty:
  enabled: true
  export_during_validation: false
  overlap: 0.25
  max_augmentations: 4
