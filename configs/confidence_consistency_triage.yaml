# Confidence + Consistency Triage

seed: 42
outer_folds: 5
inner_folds: 4
n_bootstrap: 5000
model_seeds: [42, 123, 2026]

paths:
  layer_index: "outputs_10hour/layer_embeddings/layer_embedding_index.csv"
  failure_table: "outputs_10hour/failure_tables/failure_metrics.csv"
  fold_assignments: "outputs_consistency_failure_detection/fold_assignments.csv"
  confidence_features: "outputs_layer_aware_latent_risk/case_level_confidence_features.csv"
  consistency_features: "outputs_consistency_failure_detection/case_level_features.csv"
  # Base name; if this dir already exists, a timestamped sibling is created
  # Canonical completed run: outputs_confidence_consistency_triage_20260712_030902
  output_dir: "outputs_confidence_consistency_triage"

layers:
  - encoder1
  - encoder2
  - encoder3
  - encoder4
  - bottleneck
  - decoder4
  - decoder3
  - decoder2
  - decoder1

# Anatomical targets for representation–output consistency
consistency_targets:
  - log_wt_volume
  - gt_edema_frac
  - gt_enhancing_frac
  - gt_necrosis_frac
  - gt_compactness

confidence_cols:
  - conf_mean_maxprob_all
  - conf_mean_maxprob_fg
  - conf_mean_entropy_fg
  - conf_mean_entropy_boundary
  - conf_entropy_p95_boundary
  - conf_mean_margin_all
  - conf_mean_margin_fg
  - conf_frac_maxprob_lt_0.60
  - conf_frac_maxprob_lt_0.70
  - conf_frac_maxprob_lt_0.80
  - conf_frac_maxprob_lt_0.90
  - conf_frac_margin_lt_0.10
  - conf_frac_margin_lt_0.20

morphology_cols:
  - pred_tumor_volume
  - pred_edema_volume
  - pred_enhancing_volume
  - pred_necrosis_volume
  - out_log_wt_volume
  - out_gt_edema_frac
  - out_gt_enhancing_frac
  - out_gt_necrosis_frac
  - out_gt_compactness
  - n_components
  - surface_to_volume

ridge_alphas: [0.01, 0.1, 1.0, 10.0, 100.0, 1000.0]
logistic_C: [0.01, 0.1, 1.0, 10.0, 100.0]
elasticnet_l1_ratios: [0.15, 0.5, 0.85]

# Primary failure targets for success criteria
primary_targets:
  - lowest20_mean_fg
  - mean_fg_lt_0.70

# If output_dir already has files, write to a timestamped sibling instead
overwrite_output: false
n_block_permutations: 50

failure_defs:
  - lowest20_mean_fg
  - mean_fg_lt_0.80
  - mean_fg_lt_0.70
  - edema_lt_0.70
  - lowest20_edema

# Feature-selection modes evaluated inside outer-train (pick by inner OOF AUPRC)
consistency_selection_modes:
  - all
  - absolute_only
  - signed_only
  - standardized_only
  - one_per_target_abs
  - elasticnet
