# Final validation of frozen confidence + consistency (no algorithm changes)

seed: 42
n_bootstrap: 5000
n_feature_permutations: 40
model_seeds: [42, 123, 2026]
overwrite_output: false

triage_dir: "outputs_confidence_consistency_triage_20260712_030902"
validation_output_dir: "outputs_method_validation"

paths:
  layer_index: "outputs_10hour/layer_embeddings/layer_embedding_index.csv"
  failure_table: "outputs_10hour/failure_tables/failure_metrics.csv"
  fold_assignments: "outputs_consistency_failure_detection/fold_assignments.csv"
  confidence_features: "outputs_layer_aware_latent_risk/case_level_confidence_features.csv"
  consistency_features: "outputs_consistency_failure_detection/case_level_features.csv"
  output_dir: "outputs_method_validation"

layers:
  - encoder1
  - encoder2
  - encoder3
  - encoder4
  - bottleneck
  - decoder4
  - decoder3
  - decoder2
  - decoder1

confidence_cols:
  - conf_mean_maxprob_all
  - conf_mean_maxprob_fg
  - conf_mean_entropy_fg
  - conf_mean_entropy_boundary
  - conf_entropy_p95_boundary
  - conf_mean_margin_all
  - conf_mean_margin_fg
  - conf_frac_maxprob_lt_0.60
  - conf_frac_maxprob_lt_0.70
  - conf_frac_maxprob_lt_0.80
  - conf_frac_maxprob_lt_0.90
  - conf_frac_margin_lt_0.10
  - conf_frac_margin_lt_0.20

primary_targets:
  - lowest20_mean_fg
  - mean_fg_lt_0.70

failure_defs:
  - lowest20_mean_fg
  - mean_fg_lt_0.80
  - mean_fg_lt_0.70
  - edema_lt_0.70
  - lowest20_edema
