# ~10 hour Failure Cartography run on Apple MPS
# Full BraTS training set with a large validation split for reliable baselines

seed: 42

data:
  root: "/path/to/BraTS2021_Training_Data"
  # Use the entire available training archive
  max_cases: null
  # Large holdout so embedding / uncertainty tests are statistically useful
  val_fraction: 0.30
  target_spacing: [2.0, 2.0, 2.0]
  percentile_clip: [1.0, 99.0]
  patch_size: [64, 64, 64]
  patches_per_volume: 2
  modalities: ["t1", "t1ce", "t2", "flair"]
  preload: false
  cache_dir: "outputs_10hour/cache"

model:
  in_channels: 4
  num_classes: 4
  base_features: 32
  embedding_dim: 128

training:
  # Fewer epochs than the 400-case run so full-data training fits ~10h on MPS
  epochs: 20
  batch_size: 1
  learning_rate: 0.0001
  weight_decay: 0.00001
  dice_weight: 0.5
  num_workers: 0
  val_artifact_every: 20
  checkpoint_every: 5

output:
  dir: "outputs_10hour"
  checkpoint_dir: "outputs_10hour/checkpoints"

uncertainty:
  enabled: true
  export_during_validation: false
  overlap: 0.25
  max_augmentations: 8
