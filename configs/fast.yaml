# Fast pipeline config — ~10–20 min on a small real BraTS subset (Apple MPS/CPU)

seed: 42

data:
  root: "/Users/aniketmangalampalli/Downloads/archive/BraTS2021_Training_Data"
  max_cases: 30
  val_fraction: 0.2
  # Coarser spacing keeps volumes smaller for faster preprocessing/inference
  target_spacing: [2.0, 2.0, 2.0]
  percentile_clip: [1.0, 99.0]
  patch_size: [64, 64, 64]
  patches_per_volume: 2
  modalities: ["t1", "t1ce", "t2", "flair"]

model:
  in_channels: 4
  num_classes: 4
  base_features: 16
  embedding_dim: 64

training:
  epochs: 15
  batch_size: 1
  learning_rate: 0.0001
  weight_decay: 0.00001
  dice_weight: 0.5
  num_workers: 0
  val_artifact_every: 15
  checkpoint_every: 15

output:
  dir: "outputs_fast"
  checkpoint_dir: "outputs_fast/checkpoints"

uncertainty:
  enabled: true
  export_during_validation: false
  overlap: 0.25
  # Use fewer TTA flips for speed in this quick run
  max_augmentations: 4
