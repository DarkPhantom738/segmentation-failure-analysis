# Failure Cartography — Milestone 1: BraTS segmentation + latent embeddings

seed: 42

data:
  # Root directory containing BraTS case folders (e.g. BraTS2021_Training/)
  root: "data/BraTS2021_Training"
  # Fraction of cases used for validation
  val_fraction: 0.2
  # Target isotropic voxel spacing in mm (common BraTS preprocessing)
  target_spacing: [1.0, 1.0, 1.0]
  # Intensity normalization: clip to [p01, p99] then z-score per modality
  percentile_clip: [1.0, 99.0]
  # Patch size for training (D, H, W); full volume used at validation
  patch_size: [128, 128, 128]
  # Number of random patches sampled per volume per epoch
  patches_per_volume: 4
  modalities: ["t1", "t1ce", "t2", "flair"]

model:
  in_channels: 4
  # 4 classes: background, necrosis, edema, enhancing tumor
  num_classes: 4
  base_features: 32
  embedding_dim: 256

training:
  epochs: 100
  batch_size: 2
  learning_rate: 0.0001
  weight_decay: 0.00001
  # Combined loss: lambda * Dice + (1 - lambda) * CrossEntropy
  dice_weight: 0.5
  num_workers: 4
  # Save validation artifacts every N epochs (and on final epoch)
  val_artifact_every: 10
  checkpoint_every: 10

output:
  dir: "outputs"
  checkpoint_dir: "outputs/checkpoints"

# Milestone 2: TTA-based uncertainty estimation
uncertainty:
  enabled: true
  # If true, run TTA uncertainty export automatically after validation export
  export_during_validation: false
  # Sliding-window overlap used during TTA inference
  overlap: 0.5
